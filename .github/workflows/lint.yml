name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  schema:
    name: action.yml schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install action-validator
        run: npm install -g @action-validator/core @action-validator/cli

      - name: Validate composite actions
        run: |
          action-validator npm-license-validator/action.yml
          action-validator go-license-validator/action.yml

  shell:
    name: shellcheck run blocks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Shellcheck composite action run blocks
        run: |
          severity=info
          failed=0
          for file in npm-license-validator/action.yml go-license-validator/action.yml; do
            count=$(yq '.runs.steps | length' "$file")
            file_failed=0
            for ((i = 0; i < count; i++)); do
              run=$(yq ".runs.steps[$i].run // \"\"" "$file")
              [[ -z "$run" ]] && continue
              shell=$(yq ".runs.steps[$i].shell // \"bash\"" "$file")
              name=$(yq ".runs.steps[$i].name // \"step-$i\"" "$file")
              tmp=$(mktemp --suffix=.sh)
              {
                printf '#!/usr/bin/env bash\n'
                printf 'set -euo pipefail\n'
                printf '%s\n' "$run"
              } > "$tmp"
              if ! out=$(shellcheck "--shell=$shell" "--severity=$severity" --color=never "$tmp" 2>&1); then
                file_failed=$((file_failed + 1))
                label="$file:$name"
                printf '\n::group::%s\n%s\n::endgroup::\n' "$label" "${out//$tmp/$label}"
              fi
              rm -f "$tmp"
            done
            printf '%s: %d run block(s) failing\n' "$file" "$file_failed"
            failed=$((failed + file_failed))
          done
          [[ "$failed" -eq 0 ]]

  workflow:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Run actionlint
        run: |
          "$(go env GOPATH)/bin/actionlint" -color

  security:
    name: zizmor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        with:
          advanced-security: false
